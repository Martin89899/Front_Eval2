name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Iniciando despliegue de Frontend..."
            
            # 1. Asegurar que estamos en el home y que el repo existe
            cd ~
            if [ ! -d "Front_EVAL2" ]; then
              git clone https://github.com/Martin89899/Front_EVAL2.git
            fi
            cd Front_EVAL2

            # 2. Sincronizar código
            git pull origin main

            # 3. Reiniciar contenedores con la ruta confirmada
            # Usamos sudo y la ruta completa para evitar errores de permisos o comandos
            sudo /usr/local/bin/docker-compose down || true
            sudo /usr/local/bin/docker-compose up -d --build
            
            echo "¡Despliegue completado con éxito en la nueva IP!"